name: CrimeRakshak CI/CD Deployment Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-check:
    name: Backend Lint & Type Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Check App Architecture & Imports
        run: |
          python -c "import app.main; print('FastAPI App Import Successful!')"
        working-directory: backend

  frontend-check:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Next.js Application
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8001/api/v1"
